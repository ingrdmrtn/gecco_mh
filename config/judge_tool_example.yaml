# Example config enabling the tool-using judge with diagnostic store and PPC.
# This is a standalone judge configuration block to be merged with a full
# task config such as two_step_factors_gemini31_flash_lite.yaml.
#
# To use: copy the `judge` block below into your task config YAML.
# The rest of the config (task, data, llm, evaluation, ...) is unchanged.
# -------------------------------------------------------------------------

# =========================================================================
# Judge configuration
# =========================================================================
judge:
  # "tool_using" enables the ToolUsingJudge.
  # "manual" (default) uses the standard FeedbackGenerator.
  mode: "tool_using"

  # Hard cap on tool calls per judge invocation.
  max_tool_calls: 20

  # Optional: use a different model for the judge than for generation.
  # If omitted, uses the same model as cfg.llm.base_model.
  # model: "google/gemini-2.0-flash"

  # ---------- Diagnostic store ----------
  diagnostic_store:
    # Must be true for the tool-using judge to function.
    enabled: true

  # ---------- Posterior predictive checks ----------
  ppc:
    enabled: true
    # Number of forward simulations per participant per model.
    # Reduce to 20–30 for fast smoke tests; 100+ for production.
    n_sims: 100

