loop:
  max_iterations: 2
  max_independent_runs: 1

task:
  name: "test_orchestrator_cmg"
  description: |
    CMG test configuration for centralized model generation with orchestrated judge.
    Two-step decision-making task with minimal settings for fast testing.

  goal: |
    Your task: Propose {models_per_iteration} new cognitive models as Python functions:
    {model_names}

data:
  max_prompt_trials: 5
  path: "data_g_2019/preprocessed_study2_no_baseline.csv"
  id_column: "participant"
  input_columns: ["choice_1", "state", "choice_2", "reward"]
  data2text_function: "narrative"

  narrative_template: |
    The participant chose spaceship {choice_1}, traveled to second stage state {state},
    made choice {choice_2}, and received {reward} coins.

  value_mappings:
    choice_1:
      "0": "A"
      "1": "U"
    state:
      "0": "X"
      "1": "Y"
    choice_2:
      "0": "W"
      "1": "S"

  splits:
    prompt: "[1:3]"

llm:
  provider: "openrouter"
  base_model: "qwen/qwen3.6-plus"
  temperature: 0.2
  max_tokens: 2048
  system_prompt: |
    You are a computational neuroscientist with expertise in cognitive modeling.
    Propose simple cognitive models as Python functions for the two-step task.
    Keep responses concise for testing.

  models_per_iteration: 1
  include_feedback: true
  structured_output: true
  supports_json_schema: true

  guardrails:
    - "Each model must be a standalone Python function."
    - "Function names must be `cognitive_model1`, `cognitive_model2`, etc."
    - "Take as input: `action_1, state, action_2, reward, model_parameters`."
    - "Return the **negative log-likelihood** of observed choices."
    - "Use all parameters meaningfully (no unused params)."
    - "Include a clear docstring with parameter bounds."
    - "Do NOT include any package imports inside the code you write. Assume all packages are already imported."

  template_model: |
    @njit
    def cognitive_model(action_1, state, action_2, reward, model_parameters):
        """Simple RL model for testing.
        Bounds:
        alpha: [0,1]
        beta: [0,10]
        """
        alpha, beta = model_parameters
        n_trials = len(action_1)

        q_values = np.zeros(2)
        nll = 0.0

        for trial in range(n_trials):
            exp_q = np.exp(beta * q_values)
            probs = exp_q / np.sum(exp_q)
            choice = action_1[trial]
            nll -= np.log(probs[choice] + 1e-10)

            delta = reward[trial] - q_values[choice]
            q_values[choice] += alpha * delta

        return nll

evaluation:
  metric: "bic"
  optimizer: "L-BFGS-B"
  eval_test_split: 0.7
  split_seed: 42
  fit_type: "group"

judge:
  mode: "tool_using"
  orchestrated: true
  verbose: false
  max_tool_calls: 5

  diagnostic_store:
    enabled: true

  ppc:
    enabled: false

  barrier:
    orchestrator_wait_seconds: 300
    client_wait_seconds: 300
    retry_wait_seconds: 60

# --- Centralized Model Generation ---
# In CMG mode, n_models controls both the number of candidates generated
# and the number of evaluator clients the judge will wait for.
centralized_model_generation:
  enabled: true
  generator_client: "generator"
  n_models: 2

# --- Client profiles ---
# The generator profile must exist and must NOT be a numeric evaluator ID.
# Evaluator clients use numeric IDs 0..n_models-1 and do not need profiles.
clients:
  generator:
    llm:
      models_per_iteration: 2
      temperature: 0.3
      system_prompt_suffix: |
        Focus on proposing diverse, creative candidate models for parallel evaluation.
        Ensure all {n_models} candidate functions are valid and structurally different.