slurm:
  cpus_per_task: 32
  partition: "interruptible_cpu"
  mem_per_task: "64G"

loop:
  max_iterations: 20
  max_independent_runs: 1
  n_clients: 9

task:
  name: "gemini3flash_orch_v9"
  description: |
    In this task, the participant makes a sequence of choices to earn money.
    On each trial, they first select between two images, which probabilistically
    transitions them to one of two possible second-stage screens.
    This transition relies on fixed rules; for example, one image might have a
    70% chance of leading to screen A (a "common" transition) and a 30% chance
    of leading to screen B (a "rare" transition).
    Once in the second stage, the participant chooses between two new images,
    each carrying its own probability of yielding a 25-cent reward.
    Crucially, these reward probabilities drift slowly over time between 25% and 75%,
    meaning the participant must continuously adapt to figure out which final image
    is currently paying out the most.

  goal: |
    Your task: Propose **{models_per_iteration} new cognitive models** as Python functions:
    {model_names}

data:
  max_prompt_trials: 30
  path: "data_g_2019/preprocessed_study2_no_baseline.csv"
  id_column: "participant"
  input_columns: ["choice_1", "state", "choice_2", "reward"]
  data2text_function: "narrative"

  narrative_template: |
    The participant chose spaceship {choice_1}, traveled to second stage state {state},
    made choice {choice_2}, and received {reward} coins.

  value_mappings:
    choice_1:
      "0": "A"
      "1": "U"
    state:
      "0": "X"
      "1": "Y"
    choice_2:
      "0": "W"
      "1": "S"

  splits:
    prompt: "[1:3]"

llm:
  provider: "openrouter"
  base_model: "google/gemini-3-flash-preview"
  max_tokens: 16384
  system_prompt: |
    You are a senior postdoctoral researcher in psychology and computational
    neuroscience.
    You will be given participant data from a two-step decision-making task.
    Your job is to propose cognitive models, expressed as Python functions,
    that explain how participants make their decisions over time.

  models_per_iteration: 1
  include_feedback: true
  structured_output: true
  supports_json_schema: true
  analysis_scratchpad: true

  reviewer:
    enabled: true
    persona: |
      You are an expert code reviewer for computational cognitive models.
      Your PhD is in computational neuroscience with 10+ years of experience
      debugging reinforcement learning models, likelihood functions, and
      hierarchical Bayesian models. You identify bugs BEFORE code execution.
    focus_areas:
      - numerical_stability
      - rl_correctness
      - initialization
      - parameter_bounds
      - choice_indexing
      - likelihood_correctness
    issue_types:
      critical: "Will cause runtime errors or NaN values"
      warning: "May cause numerical issues in edge cases"
      info: "Minor improvement or style suggestion"

  guardrails:
    - "Each model must be a standalone Python function."
    - "Function names must be `cognitive_model1`, `cognitive_model2`, etc."
    - "Take as input: `action_1, state, action_2, reward, model_parameters`."
    - "Return the **negative log-likelihood** of observed choices."
    - "Use all parameters meaningfully (no unused params)."
    - "Include a clear docstring for the model and each parameter."
    - "Parameter bounds: [0,1] for most; [0,10] for softmax `beta` (inverse temperature). Please refer to the template for how these are defined."
    - "Do NOT include any package imports inside the code you write. Assume all packages are already imported."
    - "Use the `@njit` decorator on the cognitive_model function for improved performance. Numba is already imported and available."
    - "IMPORTANT: Code runs under Numba @njit (nopython mode). Do NOT use `np.max(arr, axis=N)`, `np.min(arr, axis=N)`, or `np.argmax(arr, axis=N)` — Numba does not support the axis= keyword on these functions. Instead use an explicit loop: `for i in range(arr.shape[0]): result[i] = arr[i].max()` for row-wise max."

  template_model: |
    @njit
    def cognitive_model(action_1, state, action_2, reward, model_parameters):
        """Example model illustrating format only (do not reuse logic).
        Bounds:
        learning_rate: [0,1]
        beta: [0,10]
        """
        learning_rate, beta = model_parameters
        n_trials = len(action_1)

        transition_matrix = np.array([[0.7, 0.3], [0.3, 0.7]])
        p_choice_1 = np.zeros(n_trials)
        p_choice_2 = np.zeros(n_trials)
        q_stage1_mf = np.zeros(2)
        q_stage2_mf = np.zeros((2, 2))

        for trial in range(n_trials):
            max_q_stage2 = np.empty(q_stage2_mf.shape[0])
            for _s in range(q_stage2_mf.shape[0]):
                max_q_stage2[_s] = q_stage2_mf[_s].max()
            q_stage1_mb = transition_matrix @ max_q_stage2
            exp_q1 = np.exp(beta * q_stage1_mb)
            probs_1 = exp_q1 / np.sum(exp_q1)
            p_choice_1[trial] = probs_1[action_1[trial]]
            state_idx = state[trial]
            exp_q2 = np.exp(beta * q_stage2_mf[state_idx])
            probs_2 = exp_q2 / np.sum(exp_q2)
            p_choice_2[trial] = probs_2[action_2[trial]]
            delta_stage1 = q_stage2_mf[state_idx, action_2[trial]] - q_stage1_mf[action_1[trial]]
            q_stage1_mf[action_1[trial]] += learning_rate * delta_stage1
            delta_stage2 = reward[trial] - q_stage2_mf[state_idx, action_2[trial]]
            q_stage2_mf[state_idx, action_2[trial]] += learning_rate * delta_stage2

        eps = 1e-10
        log_loss = -(np.sum(np.log(p_choice_1 + eps)) + np.sum(np.log(p_choice_2 + eps)))
        return log_loss

judge:
  mode: "tool_using"
  orchestrated: true
  verbose: true
  max_tool_calls: 20

  diagnostic_store:
    enabled: true

  barrier:
    orchestrator_wait_seconds: 1800
    client_wait_seconds: 1800

  ppc:
    enabled: true
    n_sims: 100

evaluation:
  metric: "bic"
  optimizer: "L-BFGS-B"
  eval_test_split: 0.7
  split_seed: 42
  fit_type: "group"

validation:
  retry_limit: 3  # Max retries for Pydantic validation errors per model

parameter_recovery:
  enabled: true
  n_subjects: 50
  n_trials: 200
  threshold: 0.5
  n_fitting_starts: 3
  simulator: "two_step"
  simulator_config:
    transition_probs: [[0.7, 0.3], [0.3, 0.7]]
    reward_drift_sd: 0.025

baseline:
  model: |
    @njit
    def hybrid_model(action_1, state, action_2, reward, model_parameters):
      """
      Hybrid Model-Based and Model-Free Learning with Perseveration and Eligibility Traces.

      Parameters:
          - learning_rate: Learning rate for stage 1 MF updates [0, 1]
          - learning_rate_2: Learning rate for stage 2 MF updates [0, 1]
          - beta: Inverse temperature for stage 1 choices [0, 10]
          - beta_2: Inverse temperature for stage 2 choices [0, 10]
          - w: Weight on model-based vs. model-free values (stage 1) [0, 1]
          - lambd: Eligibility trace weight [0, 1]
          - perseveration: Tendency to repeat previous stage 1 action [0, 1]
      """
      learning_rate, learning_rate_2, beta, beta_2, w, lambd, perseveration = model_parameters
      n_trials = len(action_1)

      transition_matrix = np.array([[0.7, 0.3], [0.3, 0.7]])
      prev_action_indicator = np.zeros(2)
      p_choice_1 = np.zeros(n_trials)
      p_choice_2 = np.zeros(n_trials)
      q_stage1_mf = np.zeros(2)
      q_stage2_mf = np.zeros((2, 2))

      for trial in range(n_trials):
          max_q_stage2 = np.empty(q_stage2_mf.shape[0])
          for _s in range(q_stage2_mf.shape[0]):
              max_q_stage2[_s] = q_stage2_mf[_s].max()
          q_stage1_mb = transition_matrix @ max_q_stage2
          q_stage1_combined = w * q_stage1_mb + (1 - w) * q_stage1_mf
          q_stage1_with_pers = q_stage1_combined + perseveration * prev_action_indicator

          exp_q1 = np.exp(beta * q_stage1_with_pers)
          probs_1 = exp_q1 / np.sum(exp_q1)
          p_choice_1[trial] = probs_1[action_1[trial]]

          state_idx = state[trial]
          exp_q2 = np.exp(beta_2 * q_stage2_mf[state_idx])
          probs_2 = exp_q2 / np.sum(exp_q2)
          p_choice_2[trial] = probs_2[action_2[trial]]

          delta_stage1 = q_stage2_mf[state_idx, action_2[trial]] - q_stage1_mf[action_1[trial]]
          q_stage1_mf[action_1[trial]] += learning_rate * delta_stage1
          delta_stage2 = reward[trial] - q_stage2_mf[state_idx, action_2[trial]]
          q_stage2_mf[state_idx, action_2[trial]] += learning_rate_2 * delta_stage2
          q_stage1_mf[action_1[trial]] += lambd * learning_rate * delta_stage2

          prev_action_indicator.fill(0)
          prev_action_indicator[action_1[trial]] = 1

      eps = 1e-10
      log_loss = -(np.sum(np.log(p_choice_1 + eps)) + np.sum(np.log(p_choice_2 + eps)))
      return log_loss

feedback:
  type: "llm"

individual_differences_eval:
  data_path: "data_g_2019/self_report_study2.csv"
  id_column: "subj"
  behavioral_id_column: "subject_id"
  predictors: ["Factor1", "Factor2", "Factor3"]
  covariates: ["age", "gender"]

# ---------------------------------------------------------------------------
# Client profiles for distributed parallel search
# Each profile overrides LLM settings for a specific search strategy.
# Launch with: sbatch bash/run_gecco_distributed.sh two_step_factors_gemini3flash.yaml
# ---------------------------------------------------------------------------
clients:
  exploit:
    llm:
      show_best_model_code: true  # R1: Only exploit sees best model code
      feedback_guidance: |
        This client refines the current best model. Emphasise what specifically
        made the best model successful, which parameters matter most, and suggest
        small targeted modifications. Include BIC values and code-level detail.
      system_prompt_suffix: |
        Focus on refining and improving the best-performing model(s) so far.
        Make small, targeted changes to parameters and mechanisms. Try
        variations on the current best architecture — e.g. adding or
        removing a single parameter, changing how Q-values are updated,
        or adjusting the weighting between model-based and model-free
        components.

  explore:
    llm:
      show_best_model_code: false
      feedback_guidance: |
        This client seeks structurally novel models. Emphasise which broad
        mechanism classes have NOT been tried yet. De-emphasise incremental
        improvements. Be skeptical of the current best model's dominance.
      system_prompt_suffix: |
        Be creative and try fundamentally different model architectures.
        Consider cognitive mechanisms not yet explored, such as:
        - Attention or salience-based choice mechanisms
        - Forgetting or memory decay
        - Habit formation or perseveration
        - Separate learning rates for positive vs negative outcomes
        - Hierarchical or meta-learning approaches
        Do not simply tweak existing models — propose structurally novel ones.
        Treat the feedback about previous models with a high degree of skepticism.
      extra_guardrails:
        - "Each model must use at least one mechanism not present in any previous model."

  # diverse:
  #   llm:

  #     models_per_iteration: 5
  #     system_prompt_suffix: |
  #       Maximise diversity across your proposed models. Each model should
  #       use a substantially different combination of cognitive mechanisms
  #       and parameters from any other model tried so far. Treat the feedback
  #       about previous models with a high degree of skepticism — even if a
  #       model performed well, propose entirely dissimilar alternatives that
  #       explore different parts of the model space. If you notice that a
  #       certain type of model hasn't been proposed yet, make sure to try it.


  minimal:
    llm:
      show_best_model_code: false
      feedback_guidance: |
        This client targets parsimony. Highlight which parameters appear
        redundant or unidentifiable. Emphasise the BIC complexity penalty and
        suggest which mechanisms can be dropped without losing much fit.
      system_prompt_suffix: |
        Propose simple, parsimonious models with few free parameters.
        Prioritise models with 2-3 parameters that capture the core
        computational mechanisms. A simpler model with a slightly worse
        likelihood can still win on BIC due to the complexity penalty.
        Avoid adding parameters unless they meaningfully reduce the
        negative log-likelihood.
      extra_guardrails:
        - "Each model should have at most 3 free parameters."

  hybrid:
    llm:
      show_best_model_code: false
      feedback_guidance: |
        This client focuses on model-based / model-free hybrid architectures.
        Highlight how well the MB/MF balance is being exploited and what
        variations on the weighting or arbitration mechanism remain untried.
      system_prompt_suffix: |
        Focus specifically on hybrid model-based / model-free architectures.
        Explore different ways to combine MB and MF value signals:
        - Weighted mixtures with a free mixing parameter (w)
        - Arbitration based on uncertainty or conflict
        - State-dependent switching between MB and MF
        - Separate inverse temperatures for MB and MF components
        Also consider whether the transition model is learned or assumed fixed.

  complex:
    llm:
      show_best_model_code: false
      feedback_guidance: |
        This client proposes rich, high-parameter models. Highlight which latent
        variables or non-linear mechanisms improved fit most, and which parts of
        the data remain poorly explained.
      system_prompt_suffix: |
        Propose complex models that incorporate multiple cognitive mechanisms
        and have many free parameters (maximum of 10). Propose models that
        track various latent variables. Consider whether non-linear
        operations could improve fit. Don't worry about parsimony —
        focus on capturing the full complexity of the data.

  bayesian:
    llm:
      show_best_model_code: false
      feedback_guidance: |
        This client proposes Bayesian / uncertainty-tracking models. Highlight
        how well uncertainty representations improved fit, and which aspects of
        belief updating remain underexplored.
      system_prompt_suffix: |
        Propose models that use approximate Bayesian inference to learn and
        make decisions (e.g., Beta learning models). Consider how the agent
        might represent uncertainty about reward probabilities and transition
        structure, and how this uncertainty could influence choices.

  latent_state_inference:
    llm:
      show_best_model_code: false
      feedback_guidance: |
        This client focuses on latent state inference. Highlight how well belief
        states over task structure improved predictions and which belief-updating
        schemes remain untried.
      system_prompt_suffix: |
        Propose models that incorporate latent state inference or belief
        updating about the task structure. For example, the agent might
        maintain beliefs about which second-stage option is currently more
        rewarding, or whether there might be some hidden time-varying context,
        and update these beliefs over time based on observed rewards.
        Consider how this belief state could influence first-stage choices,
        and how it might interact with model-based and model-free learning.

  latent_mixture:
    llm:
      show_best_model_code: false
      feedback_guidance: |
        This client proposes mixture models. Highlight how well the mixture
        components separated participants and whether the mixing proportions are
        identifiable. Suggest alternative numbers of components or mechanisms
        per class.
      system_prompt_suffix: |
        Propose models that incorporate latent mixture components, where
        participants may belong to distinct latent classes or types, each
        with different computational strategies or parameter regimes.
        Explore various mixture modeling approaches: finite mixture models
        with different numbers of classes, class-specific parameter sets,
        and different cognitive mechanisms per class, guided by the feedback
        you have been given. Use a mixing
        probability to weight the class-specific likelihoods. This
        addresses the possibility that different participants employ
        fundamentally different decision-making strategies that a single
        set of parameters cannot capture.
        Here, "mixtures" does not refer to a mixture of strategies within a 
        single participant (e.g. a weighted MB/MF model), but rather to the idea 
        that there may be distinct subgroups of participants in the data, each 
        best explained by a different model.
      extra_guardrails:
        - "Mixture models must compute the total likelihood as a weighted sum of class-specific likelihoods."
        - "Include a mixing parameter bounded [0,1] for the class probabilities."
        - "Include a mixture of at least two models but no more than five"

  naive_psychologist:
    llm:
      show_best_model_code: false
      system_prompt_suffix: |
        A psychologist (without computational expertise) proposed the following
        hypothesis about participant behavior. Implement it faithfully as a
        computational cognitive model. Do NOT reinterpret the idea through
        standard RL frameworks unless they genuinely capture it. Invent new
        mathematical forms where needed. The implementation should be a direct
        expression of the proposed psychological mechanism.
      feedback_guidance: |
        This client has no computational modeling knowledge. Summarise what
        worked and what did not in plain psychological terms ONLY. Do NOT
        include equations, BIC values, parameter names, or code. Focus on
        which psychological ideas seemed to capture behavior well, described
        as everyday concepts. Do not refer to computational frameworks such
        as "model-based" or "model-free".

    # Optional: override the default persona profile for feedback synthesis.
    # Any subset of these keys can be specified; missing keys inherit from
    # the hardcoded default for this persona.
    # profile:
    #   angles:
    #     - ["Behavioural patterns", "Which psychological processes the models captured well"]
    #     - ["Learning and adaptation", "How well models track changes over time"]
    #     - ["Consistency and habits", "Whether models explain repetitive choices"]
    #     - ["Individual differences", "Whether models capture how people differ"]
    #     - ["Psychological coherence", "Alignment with everyday psychological intuition"]
    #     - ["Coverage", "How much of the observed behaviour the models explain"]
    #   # Or as a dict:
    #   # angles:
    #   #   Behavioural patterns: Which psychological processes the models captured well
    #   #   Learning and adaptation: How well models track changes over time
    #   metric_language: plain descriptions of how well models captured behaviour
    #   feedback_format_instructions: |
    #     1. **What worked** (1-2 sentences) — Describe the best approach in plain
    #     psychological terms...
    #   prohibitions: |
    #     - BIC values, parameter names, model code names
    #     - Equations, computational jargon
    #   always_cite: Always describe models by their psychological intuition.

    naive_ideation:
      enabled: true
      persona: |
        You are an experienced psychologist who thinks about human
        behavior in plain psychological terms. You have NO knowledge of
        computational modeling, reinforcement learning, mathematics, or
        programming. Think about what everyday psychological processes —
        such as habits, attention, emotion, memory, motivation, fatigue,
        frustration, or social comparison — might explain how people behave
        in this task. Do not propose equations or code. Just describe your
        hypothesis clearly in plain language.
      translation_preamble: |
        A psychologist — without any knowledge of computational modeling or
        reinforcement learning — observed participant behavior and proposed
        the following psychological explanation:

        ---
        {naive_idea}
        ---

        Your task is to implement this idea faithfully as a cognitive model.
        Important:
        - Treat the above as the authoritative specification. Do NOT
          reinterpret it through existing RL or computational frameworks
          unless they genuinely capture the idea.
        - If the idea does not map cleanly onto standard Q-learning, Bayesian
          inference, or any other known formalism, invent a new mathematical
          form that directly expresses the psychological mechanism described.
        - The goal is a direct computational implementation of this specific
          theory, not a standard model that vaguely resembles it.
