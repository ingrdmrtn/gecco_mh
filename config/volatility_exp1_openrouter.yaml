slurm:
  cpus_per_task: 8
  partition: "interruptible_cpu"

loop:
  max_iterations: 5
  max_independent_runs: 1

task:
  name: "volatility_exp1"
  description: |
    On each trial, the participant chooses between a green and a blue option.
    Each option has a displayed magnitude. One option is randomly designated
    as the "active" option on that trial, according to a probability that
    the participant must learn. After choosing, the participant learns which
    option was active.

    In reward/gain blocks, the active option delivers reward of its displayed
    magnitude. In pain/loss blocks, the active option delivers pain of its
    displayed magnitude. So participants want to choose the active option in
    reward blocks and avoid it in pain blocks.

    The probability that green is the active option changes over time. In
    stable phases it changes less frequently. In volatile phases it changes
    more frequently. The participant was NOT told which phase they were in.
    The model receives `stable` (1=stable, 0=volatile) as an experimenter-provided
    condition label, allowing it to have different parameters for each phase.

    Each participant completes both a reward and a pain block sequentially.
    `reset` marks the first trial of each block. `reward_task` indicates
    which block (1=reward, 0=pain).

  goal: |
    Your task: Propose **{models_per_iteration} new cognitive models** as Python functions:
    {model_names}

data:
  max_prompt_trials: 30
  path: "data/volatility/volatility_exp1_modelready.csv"
  id_column: "participant"
  input_columns:
    - "choice"
    - "green_good_outcome"
    - "green_mag"
    - "blue_mag"
    - "stable"
    - "reward_task"
    - "reset"
  data2text_function: "narrative"

  narrative_template: |
    The participant chose {choice}. Green had magnitude {green_mag}, blue had
    magnitude {blue_mag}, and green_good_outcome was {green_good_outcome}.
    Phase: {stable}. Task: {reward_task}.

  value_mappings:
    choice:
      "0": "blue"
      "1": "green"
    stable:
      "0": "volatile"
      "1": "stable"
    reward_task:
      "0": "pain/loss"
      "1": "reward/gain"

  splits:
    prompt: "[0:3]"

llm:
  provider: "openrouter"
  base_model: "openai/gpt-5.4-nano"
  max_tokens: 16384
  max_output_tokens: 4096
  temperature: 0.7
  models_per_iteration: 1
  include_feedback: true
  structured_output: true
  supports_json_schema: true
  analysis_scratchpad: true
  function_signature: "cognitive_model1(choice, green_good_outcome, green_mag, blue_mag, stable, reward_task, reset, model_parameters)"
  system_prompt: |
    You are a senior postdoctoral researcher in psychology and computational
    neuroscience with expertise in reinforcement learning, volatility adaptation,
    binary choice models, Python, and numerical optimization. You will be given
    participant data from a reward/pain volatility learning task. Your job is to
    propose cognitive models, expressed as Python functions, that explain binary
    choices over time.

  reviewer:
    enabled: false

  guardrails:
    - "Each model must be a standalone Python function."
    - "Function names must be `cognitive_model1`, `cognitive_model2`, etc."
    - "Take as input: `choice, green_good_outcome, green_mag, blue_mag, stable, reward_task, reset, model_parameters`."
    - "Return the negative log-likelihood of the observed binary choices."
    - "`choice` is 1 for choosing green and 0 for choosing blue."
    - "`green_good_outcome` is 1 when green was the good option on that trial, 0 when blue was the good option. This is consistent across reward and pain blocks."
    - "`stable` is 1 in stable blocks and 0 in volatile blocks."
    - "`reward_task` is 1 for reward/gain task trials and 0 for pain/loss task trials. The model may use this to have different parameters for reward vs pain blocks, but this is optional."
    - "`reset` is 1 on the first trial of a participant-task sequence; reset learned values and perseveration state when reset > 0.5."
    - "Use all parameters meaningfully and list every parameter with numeric bounds."
    - "Learning rates and mixing weights should usually have bounds [0,1]. Inverse temperatures or choice sensitivities should usually have bounds [0,10] or [0,30]."
    - "Use a numerically stable logistic function for binary choice probabilities; avoid overflow in `np.exp`."
    - "Every probability used in `np.log` must be guarded with epsilon inside the log. Never take log of zero, negative, NaN, or inf values."
    - "Initialize all arrays and scalar accumulators explicitly with finite values."
    - "Do NOT include any package imports inside the code you write. Assume all packages are already imported."
    - "Use the `@njit` decorator on the cognitive_model function for improved performance. Numba is already imported and available."
    - "Code runs under Numba @njit nopython mode. Do not use pandas, scipy, dictionaries, strings, list comprehensions, or unsupported NumPy axis keywords inside the function."

  template_model: |
    @njit
    def cognitive_model(choice, green_good_outcome, green_mag, blue_mag, stable, reward_task, reset, model_parameters):
        """Simple learning model for binary green/blue choice.
        Bounds:
        alpha: [0, 1]
        beta: [0, 10]
        perseveration: [-5, 5]
        """
        alpha, beta, perseveration = model_parameters
        n_trials = len(choice)
        estimate_green = 0.5
        prev_choice_code = 0.0
        nll = 0.0
        eps = 1e-10

        for t in range(n_trials):
            if reset[t] > 0.5:
                estimate_green = 0.5
                prev_choice_code = 0.0

            prob_diff = 2.0 * estimate_green - 1.0
            value = beta * prob_diff + perseveration * prev_choice_code

            if value >= 0.0:
                exp_neg = np.exp(-value)
                p_green = 1.0 / (1.0 + exp_neg)
            else:
                exp_pos = np.exp(value)
                p_green = exp_pos / (1.0 + exp_pos)

            if choice[t] > 0.5:
                p_chosen = p_green
                prev_choice_code = 1.0
            else:
                p_chosen = 1.0 - p_green
                prev_choice_code = -1.0

            if p_chosen < eps:
                p_chosen = eps
            elif p_chosen > 1.0 - eps:
                p_chosen = 1.0 - eps
            nll -= np.log(p_chosen)

            estimate_green += alpha * (green_good_outcome[t] - estimate_green)
            if estimate_green < eps:
                estimate_green = eps
            elif estimate_green > 1.0 - eps:
                estimate_green = 1.0 - eps

        return nll

evaluation:
  metric: "bic"
  optimizer: "L-BFGS-B"
  eval_test_split: 0.7
  split_seed: 42
  fit_type: "group"

parameter_recovery:
  enabled: false

baseline:
  model: |
    @njit
    def volatility_baseline(choice, green_good_outcome, green_mag, blue_mag, stable, reward_task, reset, model_parameters):
        """Simple volatility learning model for binary green/blue choice.
        Bounds:
        alpha_stable: [0, 1]
        alpha_volatile: [0, 1]
        beta: [0, 10]
        w_magnitude: [0, 1]
        perseveration: [-5, 5]
        """
        alpha_stable, alpha_volatile, beta, w_magnitude, perseveration = model_parameters
        n_trials = len(choice)
        estimate_green = 0.5
        prev_choice_code = 0.0
        nll = 0.0
        eps = 1e-10

        for t in range(n_trials):
            if reset[t] > 0.5:
                estimate_green = 0.5
                prev_choice_code = 0.0

            prob_diff = 2.0 * estimate_green - 1.0
            mag_diff = green_mag[t] - blue_mag[t]
            value = beta * (w_magnitude * mag_diff + (1.0 - w_magnitude) * prob_diff)
            value += perseveration * prev_choice_code

            if value >= 0.0:
                exp_neg = np.exp(-value)
                p_green = 1.0 / (1.0 + exp_neg)
            else:
                exp_pos = np.exp(value)
                p_green = exp_pos / (1.0 + exp_pos)

            if choice[t] > 0.5:
                p_chosen = p_green
                prev_choice_code = 1.0
            else:
                p_chosen = 1.0 - p_green
                prev_choice_code = -1.0

            if p_chosen < eps:
                p_chosen = eps
            elif p_chosen > 1.0 - eps:
                p_chosen = 1.0 - eps
            nll -= np.log(p_chosen)

            if stable[t] > 0.5:
                alpha = alpha_stable
            else:
                alpha = alpha_volatile
            estimate_green += alpha * (green_good_outcome[t] - estimate_green)
            if estimate_green < eps:
                estimate_green = eps
            elif estimate_green > 1.0 - eps:
                estimate_green = 1.0 - eps

        return nll

feedback:
  type: "manual"
